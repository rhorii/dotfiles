name: Format

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  nixfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Check Nix formatting
        run: |
          nix run nixpkgs#nixfmt-rfc-style -- --check \
            $(find . -name '*.nix' -not -path './.git/*')
